<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="game-shell">
      <h1>Flappy Bird</h1>
      <canvas id="gameCanvas" width="480" height="640"></canvas>
      <div class="help">
        <p>Press <strong>Space</strong> or click/tap to flap.</p>
        <p>Try to fly between the pipes and score as many points as possible.</p>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
