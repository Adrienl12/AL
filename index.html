<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity Rush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="game-card">
      <div class="hud">
        <div>
          <p class="eyebrow">Arcade Challenge</p>
          <h1>Velocity Rush</h1>
        </div>
        <p class="subtext">A blazing, original platformer with rings, jumps, and high-speed boosts.</p>
      </div>
      <canvas id="gameCanvas" width="900" height="500"></canvas>
      <div class="controls">Arrow keys or WASD to move • Up or Space to jump • Hold Shift to boost</div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
